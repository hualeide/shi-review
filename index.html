<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>史记档 · 答题卡</title>
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">史记档</div>
      <div class="meta" id="meta">加载中…</div>
    </header>

    <nav class="sheet-nav" id="sheetNav" hidden>
      <button type="button" class="tab is-on" data-filter="record">记录</button>
      <button type="button" class="tab" data-filter="all">全部</button>
      <button type="button" class="tab" data-filter="single">单条</button>
      <span class="nav-hint">点格看全文 · GitHub 网盘</span>
    </nav>

    <main class="stage stage-sheet" id="stage">
      <p class="loading">正在加载条目…</p>
    </main>

    <section class="detail-bar" id="detailBar" hidden>
      <button type="button" class="ghost" id="btnBackSheet">← 答题卡</button>
      <div class="scores soft" id="scores" title="可选打分">
        <button type="button" data-score="1">1</button>
        <button type="button" data-score="2">2</button>
        <button type="button" data-score="3">3</button>
        <button type="button" data-score="4">4</button>
        <button type="button" data-score="5">5</button>
      </div>
      <p class="hint tiny" id="syncStatus"></p>
    </section>

    <footer class="foot" id="foot" hidden>
      <button type="button" class="ghost" id="btnExport">导出标记</button>
      <a class="ghost" href="scores.html">汇总</a>
    </footer>
  </div>
  <script src="config.js?v=11"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
